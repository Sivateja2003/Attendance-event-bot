services:
  - type: web
    name: face-auth
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: MATCH_THRESHOLD
        value: "0.72"
      - key: LIVENESS_CHECK
        value: "False"
