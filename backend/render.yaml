services:
  - type: web
    name: face-auth-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: face-auth-db
          property: connectionString
      - key: ALLOW_ORIGINS
        value: https://your-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: MATCH_THRESHOLD
        value: "0.72"
      - key: LIVENESS_CHECK
        value: "False"

databases:
  - name: face-auth-db
    databaseName: face_auth
    plan: free
