databases:
  - name: face-auth-db
    databaseName: face_auth
    plan: free
    user: face_auth_user

services:
  # ── Backend (FastAPI + facenet-pytorch) ──────────────────────────────────
  - type: web
    name: face-auth-backend
    runtime: python
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: face-auth-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@gmail.com
      - key: ADMIN_PASSWORD
        sync: false          # set manually in Render dashboard
      - key: CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: MATCH_THRESHOLD
        value: "0.72"
      - key: LIVENESS_CHECK
        value: "False"
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard

  # ── Frontend (React + Vite static site) ───────────────────────────────────
  - type: web
    name: face-auth-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: face-auth-backend
          type: web
          property: host
          transform: "https://$VALUE"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
